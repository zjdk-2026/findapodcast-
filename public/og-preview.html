<!DOCTYPE html>
<html>
<head><style>
  body { margin: 0; background: #2d1b1e; width: 1200px; height: 630px; display: flex; align-items: center; justify-content: center; flex-direction: column; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .icon { width: 200px; height: 200px; background: #7F66FF; border-radius: 45px; display: flex; align-items: center; justify-content: center; }
  .mic { width: 60px; height: 95px; position: relative; }
  .mic-capsule { width: 52px; height: 82px; background: white; border-radius: 26px; position: absolute; left: 4px; top: 0; }
  .mic-cradle { width: 52px; height: 28px; position: absolute; left: 4px; top: 88px; }
  .cradle-arm { width: 10px; height: 24px; background: white; border-radius: 5px; position: absolute; top: 0; }
  .cradle-arm.left { left: 0; }
  .cradle-arm.right { right: 0; }
  .cradle-bar { width: 52px; height: 10px; background: white; border-radius: 5px; position: absolute; bottom: 0; }
  .mic-stand { width: 10px; height: 12px; background: white; border-radius: 3px; position: absolute; left: 25px; top: 116px; }
  .mic-base { width: 36px; height: 7px; background: white; border-radius: 3.5px; position: absolute; left: 12px; top: 128px; }
  h1 { color: #eeeef0; font-size: 40px; font-weight: 700; margin: 50px 0 0 0; letter-spacing: -0.5px; }
  p { color: #b8aeb2; font-size: 18px; margin: 10px 0 0 0; font-weight: 400; }
</style></head>
<body>
  <div class="icon">
    <div class="mic">
      <div class="mic-capsule"></div>
      <div class="mic-cradle">
        <div class="cradle-arm left"></div>
        <div class="cradle-arm right"></div>
        <div class="cradle-bar"></div>
      </div>
      <div class="mic-stand"></div>
      <div class="mic-base"></div>
    </div>
  </div>
  <h1>Find A Podcast</h1>
  <p>Your podcast guesting engine</p>
</body>
</html>
